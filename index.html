<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensayo API Compensatorios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow p-4">
            <h3 class="text-center">Laboratorio API</h3>
            <p class="text-muted text-center">Ensayos de conexión GitHub -> Google</p>
            
            <div class="mb-3">
                <input type="number" id="cedulaInput" class="form-control" placeholder="Cédula de prueba">
            </div>
            <button class="btn btn-success w-100" onclick="ejecutarFetch()">Consultar vía API</button>

            <div id="loading" class="text-center mt-3 d-none">
                <div class="spinner-border text-success" role="status"></div>
            </div>

            <div id="resultado" class="mt-4"></div>
        </div>
    </div>

    <script>
        function ejecutarFetch() {
            const cedula = document.getElementById('cedulaInput').value;
            const resDiv = document.getElementById('resultado');
            const loader = document.getElementById('loading');

            if(!cedula) return alert("Escribe una cédula");

            resDiv.innerHTML = "";
            loader.classList.remove('d-none');

            // REEMPLAZA ESTA URL POR LA QUE COPIASTE DE GOOGLE
            const urlApi = "TU_URL_DE_APPS_SCRIPT_AQUI?cedula=" + cedula;

            fetch(urlApi)
                .then(response => response.json())
                .then(data => {
                    loader.classList.add('d-none');
                    if(data.encontrado) {
                        resDiv.innerHTML = `
                            <div class="alert alert-success">
                                <strong>Funcionario:</strong> ${data.nombre}<br>
                                <strong>Registros:</strong> ${data.lista.length}
                            </div>`;
                    } else {
                        resDiv.innerHTML = `<div class="alert alert-danger">No encontrado en la copia.</div>`;
                    }
                })
                .catch(error => {
                    loader.classList.add('d-none');
                    console.error("Error:", error);
                    alert("Error de conexión. Revisa la consola (F12).");
                });
        }
    </script>
</body>
</html>
