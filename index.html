<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensayo API Compensatorios</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light p-4">
    <div class="container mt-5" style="max-width: 500px;">
        <div class="card shadow p-4">
            <h3 class="text-center">Laboratorio API</h3>
            <p class="text-muted text-center">Ensayos de conexión GitHub -> Google</p>
            
            <div class="mb-3">
                <input type="number" id="cedulaInput" class="form-control" placeholder="Cédula de prueba">
            </div>
            <button class="btn btn-success w-100" onclick="ejecutarFetch()">Consultar vía API</button>

            <div id="loading" class="text-center mt-3 d-none">
                <div class="spinner-border text-success" role="status"></div>
            </div>

            <div id="resultado" class="mt-4"></div>
        </div>
    </div>

    <script>
       function ejecutarFetch() {
            const cedula = document.getElementById('cedulaInput').value;
            const resDiv = document.getElementById('resultado');
            const loader = document.getElementById('loading');

            if(!cedula) return alert("Escribe una cédula");

            resDiv.innerHTML = "";
            loader.classList.remove('d-none');

            // URL Corregida con el signo "?"
            const urlApi = "https://script.google.com/macros/s/AKfycbx0AKYf4aIIow95I_VoktCfMt2nF9spzMIWBNGVQJ_mVhLFQQQzEHn6gQZ1woapesusqQ/exec?cedula=" + cedula;

            fetch(urlApi)
                .then(response => response.json())
                .then(data => {
                    loader.classList.add('d-none');
                    
                    if(data.encontrado) {
                        // 1. Ponemos el nombre del funcionario arriba
                        let html = `<h4 class="text-primary mb-3">${data.nombre}</h4><hr>`;
                        
                        // 2. RECORREMOS LA LISTA (Aquí es donde ocurre la magia)
                        data.lista.forEach(item => {
                            // Elegimos el color del badge según el estado
                            const colorClass = item.estado === "Disfrutado" ? "bg-success" : "bg-secondary";
                            
                            html += `
                                <div class="mb-3 p-3 border-bottom shadow-sm bg-white rounded">
                                    <div class="d-flex justify-content-between align-items-center">
                                        <h6 class="mb-1"><strong>${item.nombre}</strong></h6>
                                        <span class="badge ${colorClass}">${item.estado}</span>
                                    </div>
                                    <small class="text-muted">📅 Fecha: ${item.fecha || '---'}</small><br>
                                    ${item.obs ? `<small class="text-dark">📝 Obs: ${item.obs}</small>` : ''}
                                </div>`;
                        });
                        
                        resDiv.innerHTML = html;
                    } else {
                        resDiv.innerHTML = `<div class="alert alert-danger">No se encontró funcionario en la base de datos.</div>`;
                    }
                })
                .catch(error => {
                    loader.classList.add('d-none');
                    console.error("Error:", error);
                    alert("Error de conexión. Revisa que el script esté publicado como 'Cualquier persona'.");
                });
        }
    </script>
</body>
</html>
