
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planilla de Resultados - Sorteo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; padding: 30px; font-family: 'Segoe UI', sans-serif; }
        .tabla-card { background: white; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); padding: 25px; }
        .thead-dark { background-color: #2c3e50; color: white; }
        .btn-regresar { margin-bottom: 20px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" class="btn btn-outline-primary btn-regresar">← Volver al Inicio</a>

    <div class="tabla-card">
        <h2 class="text-center mb-4">Planilla de Turnos - Resultado Sorteo</h2>
        
        <div id="loader" class="text-center my-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2 text-muted">Obteniendo datos del sorteo...</p>
        </div>

        <div class="table-responsive">
            <table class="table table-striped table-hover d-none" id="tablaSorteo">
                <thead id="cabeceraTabla" class="thead-dark"></thead>
                <tbody id="cuerpoTabla"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // USA TU URL DE SIEMPRE AGREGANDO EL PARÁMETRO DE ACCIÓN
    const URL_API = "https://script.google.com/macros/s/AKfycbz8kLIq8aF4VwybSKZaOct1zIF9Z1HDSeeEPzwFnHV0nJ1j4Kzisk9i4mIZFM6UO9KG/exec";

    fetch(URL_API)
        .then(res => res.json())
        .then(data => {
            document.getElementById('loader').classList.add('d-none');
            const tabla = document.getElementById('tablaSorteo');
            const head = document.getElementById('cabeceraTabla');
            const body = document.getElementById('cuerpoTabla');

            // 1. Generar encabezados automáticamente
            let headerHtml = "<tr>";
            data.columnas.forEach(col => headerHtml += `<th>${col}</th>`);
            headerHtml += "</tr>";
            head.innerHTML = headerHtml;

            // 2. Generar las filas con los nombres y días
            data.filas.forEach(fila => {
                let filaHtml = "<tr>";
                fila.forEach(celda => {
                    filaHtml += `<td>${celda || '---'}</td>`;
                });
                filaHtml += "</tr>";
                body.innerHTML += filaHtml;
            });

            tabla.classList.remove('d-none');
        })
        .catch(error => {
            console.error(error);
            alert("Error al conectar con la base de datos del sorteo.");
        });
</script>

</body>
</html>
